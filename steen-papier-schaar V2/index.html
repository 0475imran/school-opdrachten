<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Steen Papier Schaar V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎮 Steen Papier Schaar</h1>

    <div class="game-info">
        <p>🤖 Computer: <span id="computer">-</span></p>
        <p>👤 Jouw keuze: <span id="human">-</span></p>
        <p>🏆 Uitkomst: <span id="result">Maak een keuze!</span></p>
    </div>

    <div class="scoreboard">
        <h2>📊 Scorebord</h2>

        <p>Jij: <span id="playerScore">0</span></p>

        <p>Computer: <span id="computerScore">0</span></p>

        <p>Ronde: <span id="round">0</span></p>

        <p>Win Streak: <span id="streak">0</span></p>
    </div>

    <div class="buttons">
        <button id="steen">🪨 Steen</button>
        <button id="papier">📄 Papier</button>
        <button id="schaar">✂️ Schaar</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
